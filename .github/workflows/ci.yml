name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra dev --extra service

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Types
        run: uv run mypy

      - name: Unit tests
        # Includes tests/test_git_credentials.py (askpass / publish auth regressions).
        run: uv run pytest

      - name: Git askpass publish-auth regression
        # Explicit pin so CI still fails loudly if the suite filter changes.
        run: uv run pytest tests/test_git_credentials.py tests/test_git_auth.py
