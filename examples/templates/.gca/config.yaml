version: 1

context:
  files: [AGENTS.md, CLAUDE.md]
  include_frontmatter: false
  persona_file: .gca/persona.md
  phase_personas:
    planning: .gca/personas/planning.md
    implementation: .gca/personas/implementation.md
    review: .gca/personas/review.md

skills:
  dirs: [.gca/skills, skills]

routing:
  workflow: auto
  models:
    fast: gpt-5.6-luna
    planning: claude-opus-4.8
    implementation: gpt-5.6-luna
    review: claude-fable-5
  max_review_cycles: 2

runtime:
  profile: local
  max_steps: 25
  max_tool_timeout: 300
  max_output_chars: 20000
  max_read_bytes: 1000000

tools:
  deny: []

# Add repository-specific commands as fixed argv tools. For example:
#
# tools:
#   deny: []
#   fixed_commands:
#     run_tests:
#       description: Run the repository test suite.
#       argv: [your-test-command]
#       cwd: .
#       timeout: 300
#       phases: [execute, implementation, review]

# Service-owned publication can require fixed checks and bound the diff.
# Auto-merge also requires the operator ceiling GCA_ALLOW_AUTO_MERGE_PROJECTS.
#
# publication:
#   required_checks: [run_tests]
#   allowed_paths: ["src/**", "tests/**", "README.md"]
#   denied_paths: [".env", ".gca/.env"]
#   max_files: 50
#   max_changed_lines: 2000
#   auto_merge: false
