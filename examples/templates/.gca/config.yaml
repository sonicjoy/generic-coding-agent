version: 1

context:
  files: [AGENTS.md, CLAUDE.md]
  include_frontmatter: false
  persona_file: .gca/persona.md
  phase_personas:
    planning: .gca/personas/planning.md
    implementation: .gca/personas/implementation.md
    review: .gca/personas/review.md

skills:
  dirs: [.gca/skills, skills]

routing:
  workflow: auto
  models:
    fast: deepseek-v3.2
    planning: claude-opus-4.8
    implementation: deepseek-v3.2
    review: claude-opus-4.8
  max_review_cycles: 2

runtime:
  profile: local
  max_steps: 25
  max_tool_timeout: 300
  max_output_chars: 20000
  max_read_bytes: 1000000

# Optional container limits for the isolation image. Omit dockerfile to use
# GCA's packaged default isolation image, or set dockerfile: Dockerfile.agent.
# environment:
#   dockerfile: Dockerfile.agent
#   working_dir: /workspace
#   cpu: 2
#   memory: 4g
#   # Default false. Set true only for trusted fixed commands that need
#   # outbound access; networked containers can exfiltrate workspace data.
#   network: false
#   default_timeout: 300
#   remove_image_after_run: false

tools:
  deny: []

# Add repository-specific commands as fixed argv tools. For example:
#
# tools:
#   deny: []
#   fixed_commands:
#     run_tests:
#       description: Run the repository test suite.
#       argv: [your-test-command]
#       cwd: .
#       timeout: 300
#       phases: [execute, implementation, review]

# Service-owned publication can require fixed checks and bound the diff.
# Auto-merge also requires the operator ceiling GCA_ALLOW_AUTO_MERGE_PROJECTS.
# When required_checks is omitted, GCA still parse-checks changed .py files and
# runs ruff/mypy through the isolation image when those tools are installed.
#
# publication:
#   required_checks: [run_tests]
#   allowed_paths: ["src/**", "tests/**", "README.md"]
#   denied_paths: [".env", ".gca/.env"]
#   max_files: 50
#   max_changed_lines: 2000
#   auto_merge: false
