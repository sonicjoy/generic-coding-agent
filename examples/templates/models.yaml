# Ready-to-copy model catalog for a project workspace.
# Example (mmmapper):
#   cp /path/to/generic-coding-agent/examples/templates/models.yaml /path/to/mmmapper/
#
# API keys stay in environment variables / .env files — never in this file.

providers:
  openrouter:
    type: openai_compatible
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    headers:
      HTTP-Referer: https://github.com/sonicjoy/generic-coding-agent
      X-Title: generic-coding-agent

models:
  deepseek-v3.2:
    provider: openrouter
    model_id: deepseek/deepseek-v3.2
    strength: 3
    speed: 5
    cost: 1

  grok-4.5:
    provider: openrouter
    model_id: x-ai/grok-4.5
    strength: 3
    speed: 5
    cost: 2

  gpt-5.6-luna:
    provider: openrouter
    model_id: openai/gpt-5.6-luna
    strength: 3
    speed: 5
    cost: 1

  claude-sonnet-5:
    provider: openrouter
    model_id: anthropic/claude-sonnet-5
    strength: 3
    speed: 4
    cost: 2

  claude-fable-5:
    provider: openrouter
    model_id: anthropic/claude-fable-5
    strength: 5
    speed: 2
    cost: 5

  claude-opus-4.8:
    provider: openrouter
    model_id: anthropic/claude-opus-4.8
    strength: 5
    speed: 2
    cost: 5

  gpt-5.6-sol:
    provider: openrouter
    model_id: openai/gpt-5.6-sol
    strength: 5
    speed: 2
    cost: 5
