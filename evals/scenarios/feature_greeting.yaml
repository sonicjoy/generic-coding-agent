id: feature_greeting
description: Feature workflow should hand off planner to implementer to reviewer.
task: Implement greeting behavior
workflow: feature
max_steps: 10
scripts:
  strong:
    - tool_calls:
        - name: finish
          arguments:
            plan: Create greeting.py returning Hello, {name}! and verify it.
    - tool_calls:
        - name: run_command
          arguments:
            command: python -c "import greeting; assert greeting.greet('Ada') == 'Hello, Ada!'"
    - tool_calls:
        - name: finish
          arguments:
            verdict: approved
            summary: Greeting behavior verified.
  fast:
    - tool_calls:
        - name: create_file
          arguments:
            path: greeting.py
            content: |
              def greet(name):
                  """Return a greeting."""
                  return f"Hello, {name}!"
    - tool_calls:
        - name: finish
          arguments:
            summary: Implemented greeting.py.
expect:
  status: completed
  workflow: feature
  phases:
    - planning
    - implementation
    - review
  models:
    - strong
    - fast
    - strong
  plan_contains: greeting.py
  files:
    greeting.py:
      contains: def greet
  final_contains: Greeting behavior verified.
