# Local / cloud-like bring-up for the GCA API + worker.
# Requires Docker Engine on the host. The worker mounts the host docker socket
# so per-run isolation containers can be built and executed.
#
#   cp examples/service.env.example .env   # edit tokens
#   docker compose up --build
#
# Start order matters for SQLite schema init: wait for API /ready before the
# worker claims jobs. Compose enforces that via the API healthcheck.

services:
  api:
    build: .
    image: gca:local
    command: ["gca-service", "api", "--host", "0.0.0.0", "--port", "8080"]
    env_file:
      - path: .env
        required: false
    environment:
      GCA_DATA_DIR: /var/lib/gca
    ports:
      - "8080:8080"
    volumes:
      - gca-data:/var/lib/gca
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/ready"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 2s

  worker:
    image: gca:local
    depends_on:
      api:
        condition: service_healthy
    command: ["gca-service", "worker"]
    env_file:
      - path: .env
        required: false
    environment:
      GCA_DATA_DIR: /var/lib/gca
    volumes:
      - gca-data:/var/lib/gca
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  gca-data:
